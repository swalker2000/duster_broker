mqtt:
  broker:
    # Значение будет переопределено системным свойством из тестового bootstrap,
    # но дефолт делаем TCP, чтобы не требовать TLS в тестах.
    url: ${MQTT_BROKER_URL:tcp://localhost:1883}
    username: ${MQTT_BROKER_USERNAME:}
    password: ${MQTT_BROKER_PASSWORD:}
  ssl:
    insecure: true
  qos: 1

spring:
  datasource:
    url: jdbc:h2:mem:duster;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop

